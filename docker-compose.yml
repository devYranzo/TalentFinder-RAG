services:
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres_vector
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: rag_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./backend/scripts:/docker-entrypoint-initdb.d
    networks:
      - rag_network

  api:
    build: ./backend
    container_name: rag_api
    depends_on:
      - db
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/storage/CVs:/app/storage/CVs
    environment:
      - PDF_PATH=/app/storage/CVs
    networks:
      - rag_network

  frontend:
    build: ./frontend
    container_name: rag_frontend
    ports:
      - '80:80'
    depends_on:
      - api
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge

volumes:
  postgres_data:
