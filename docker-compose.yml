services:
  db:
    image: pgvector/pgvector:pg16
    container_name: postgres_vector
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: rag_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql
      # El script SQL ahora está dentro de backend/scripts
      - ./backend/scripts:/docker-entrypoint-initdb.d
    networks:
      - rag_network

  api:
    build: ./backend  # Docker buscará el Dockerfile aquí
    container_name: rag_api
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Los PDFs ahora están en backend/CVs
      - ./backend/CVs:/app/CVs
    networks:
      - rag_network

  frontend:
    build: ./frontend
    container_name: rag_frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge

volumes:
  postgres_data: